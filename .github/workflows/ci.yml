name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test --runInBand

      - run: pnpm i18n:check

      - run: pnpm static:check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install fonttools brotli

      - run: pnpm fonts:verify

      # 배포되는 production 의존성만 감사한다. dev/빌드 전용 의존성(jest의 jsdom>ws,
      # bundle-analyzer>ws, open-graph-scraper>undici 등)의 취약점은 사용자에게 도달하지 않고
      # 상위 패키지의 생태계 업데이트 전까지 수정 불가라, 신규 advisory가 뜰 때마다 CI를
      # 영구히 막는 노이즈가 된다. production 의존성은 별도로 깨끗하게 유지한다.
      - run: pnpm audit --prod

      - run: pnpm build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-CI0TEST00
