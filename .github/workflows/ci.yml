name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test --runInBand

      - run: pnpm i18n:check

      - run: pnpm static:check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install fonttools brotli

      - run: pnpm fonts:verify

      # 배포되는 production 의존성만 감사한다. dev/빌드 전용 의존성(jest의 jsdom>ws,
      # bundle-analyzer>ws, open-graph-scraper>undici 등)의 취약점은 사용자에게 도달하지 않고
      # 상위 패키지의 생태계 업데이트 전까지 수정 불가라, 신규 advisory가 뜰 때마다 CI를
      # 영구히 막는 노이즈가 된다. production 의존성은 별도로 깨끗하게 유지한다.
      - run: pnpm audit --prod

      # OG 파생 jpg 재인코딩 캐시. build 스텝(pnpm build → generate-og-images.mjs)이
      # sharp 로 67개를 매 빌드 재인코딩하지 않도록, 이전 빌드 산출물과 내용 주소
      # 미러를 복원한다. 키는 원본 경로 집합의 SSOT 인 매니페스트 해시 — 원본이
      # 추가/제거되면 키가 바뀌어 전량 재생성되고, 그 외엔 복원 후 스크립트가 내용
      # 해시로 변경분만 재인코딩한다. .next/cache/og-derived 는 스크립트의 캐시
      # 진실원천(Vercel 과 동일 경로), public/images/og/_derived 는 서빙 산출물.
      - uses: actions/cache@v4
        with:
          path: |
            public/images/og/_derived
            .next/cache/og-derived
          key: og-derived-${{ hashFiles('src/generated/og-derived-manifest.json') }}

      - run: pnpm build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-CI0TEST00
