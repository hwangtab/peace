name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test --runInBand

      - run: pnpm i18n:check

      - run: pnpm static:check

      - run: pnpm timetable:check

      - run: pnpm audit

      - run: pnpm build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-CI0TEST00
